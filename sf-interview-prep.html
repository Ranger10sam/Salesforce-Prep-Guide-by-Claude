{id:"behavioral",title:"Behavioral & HR",icon:"🎯",desc:"These questions decide your salary band as much as technical ones. For 8–12 LPA, interviewers want to see growth mindset, ownership, and self-awareness. Your unique profile — live app + 6 certifications + client experience — is a genuine differentiator.",questions:[

{q:"Tell me about yourself.",tag:"hot",a:"<strong>Structure: Present → Past → Future (60 seconds max)</strong>. Present: '2+ years at Cognizant as a Salesforce developer — building Apex backends and automated workflows for global healthcare clients including Abbott and Zoetis. I'm 6x Salesforce certified — including Platform Developer I, App Builder, Administrator, and the new Agentforce Specialist.' Past: 'Before Cognizant, I completed a Java internship at LTIMindtree and graduated with a 9.25 GPA — ranked 1st in my final semester.' Future: 'I'm looking to step into a more senior Salesforce developer role where I can take deeper ownership of architecture decisions and work on complex integration challenges.'",tip:"End with a hook toward this specific company: 'I'm particularly interested in [Accenture's SF CoE / Deloitte's cloud practice / LTIMindtree's platform team] because of [specific reason — mention if you know something about their client portfolio or tech focus].' Preparation = interest = seriousness.",ctx:"<strong>For ChefBit:</strong> If asked, mention it naturally but tie it back to Salesforce: 'I also independently built and shipped a production app on Google Play — 1,000+ downloads. The backend engineering discipline I applied there — clean APIs, database design, async processing — reinforces the same principles I use writing production Apex.'",links:[]},

{q:"Why are you looking to switch? Why leave Cognizant?",tag:"hot",a:"<strong>Honest, forward-looking framing:</strong> 'I've had a genuinely good run at Cognizant — strong delivery, 5/5 performance ratings, meaningful client work on Abbott and Zoetis. I'm not leaving because anything is broken. I'm looking to step into a role where I can take on more technical ownership — closer to architecture decisions, more complex integration challenges, and ideally working with a tighter Salesforce CoE team. [Target company] being a specialist in [SF ecosystem work / specific domain] is exactly the kind of environment I want to grow in.' Never mention compensation as the primary driver in opening answers.",tip:"If you're also testing Java opportunities simultaneously, do NOT mention this in Salesforce interviews. In this interview, you are 100% committed to a Salesforce career path. Your 6 certifications and live project experience confirm this commitment.",links:[]},

{q:"You have 6 Salesforce certifications. Which one was hardest? What did you learn from it?",tag:"hot",a:"<strong>Honest answer:</strong> Platform Developer I is the hardest from the developer track — it tests deep Apex, SOQL optimization, testing frameworks, and async processing in ways that surface gaps in production habits, not just syntax knowledge. The Agentforce Specialist was intellectually challenging because it's new territory — generative AI integrations within Salesforce, a shift in how I think about automation. What the certifications collectively gave me: a structured mental model of the entire platform, not just the parts I happened to use at work. They forced me to learn Salesforce Administration depth that makes me a better developer — I understand why certain platform constraints exist.",tip:"Connect certifications to practical impact: 'After PD1 prep, I immediately applied SOQL selectivity patterns to production queries at Cognizant — the certification directly improved my code quality, not just my LinkedIn profile.'",links:[["Trailhead — Platform Developer I","https://trailhead.salesforce.com/en/credentials/platformdeveloper1"]]},

{q:"Describe a time you made a mistake in production. How did you handle it?",tag:"core",a:"<strong>Structure: Honest → Specific → Owned → Resolved → Learned.</strong> Prepare a real example from Cognizant — a trigger that caused unexpected side effects, a DML error in batch that you debugged, a non-selective query that caused timeout. Walk through: what you did, how you identified the issue, what you communicated to the team, how you fixed it, what process change you made afterward to prevent recurrence. The most important parts: taking ownership without deflecting, showing systematic debugging, and demonstrating that you institutionalized the lesson.",tip:"'I won't pretend I've never pushed code with an issue — I've had a trigger recursion scenario surface in UAT at Cognizant. I caught it before production, but the near-miss taught me to add static flag recursion control as a code review checklist item going forward.' Honesty + the word 'checklist' signals maturity.",links:[]},

{q:"What's your experience with Salesforce DevOps / deployment processes?",tag:"core",a:"<strong>Levels to cover:</strong> (1) <strong>Change Sets:</strong> Salesforce's built-in deployment tool — works for straightforward metadata migrations but no source control. (2) <strong>SFDX / SF CLI:</strong> source-driven development with scratch orgs, sfdx-project.json, push/pull commands, much better for team collaboration and CI/CD pipelines. (3) <strong>Source control integration:</strong> GitHub/Bitbucket with VS Code + Salesforce Extension Pack for version tracking. (4) <strong>CI/CD:</strong> tools like Gearset, Copado, Jenkins, or GitHub Actions for automated testing and deployment gates.",tip:"'At Cognizant, our team used a combination of Change Sets for smaller hotfixes and SFDX for larger feature deployments with source control. I'm comfortable with both models and understand the limitations of Change Sets at scale — which is why I've been learning SFDX tooling proactively.'",links:[["Trailhead — Salesforce DX","https://trailhead.salesforce.com/content/learn/trails/sfdx_get_started"]]},

{q:"Where do you see yourself in 2–3 years in Salesforce?",tag:"core",a:"<strong>Anchored, specific, and Salesforce-committed:</strong> 'In 2–3 years, I want to be a Senior Salesforce Developer or Architect — designing end-to-end solution architectures for enterprise clients rather than implementing individual features. I'm particularly interested in the integration space, AI-augmented Salesforce (Agentforce, Einstein), and deepening my experience with multi-cloud solutions. My Agentforce Specialist cert is a deliberate step toward that — AI-native workflows on the platform are where I see the most growth opportunity in the next few years.'",tip:"For Accenture/Deloitte specifically, mention: 'I'm also interested in the path toward Salesforce Architect certifications — Application Architect is my next certification goal.' MNC SIs value candidates who invest in the platform long-term.",links:[]},

]}

]; // end DATA

// ENGINE
// ─────────────────────────────────────────────
const STORAGE_KEY = 'sf_prep_done_v2';
let done = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify([...done])); }

function renderAll() {
  const nav = document.getElementById('sidebarNav');
  const content = document.getElementById('mainContent');
  nav.innerHTML = ''; content.innerHTML = '';

  let globalTotal = 0;
  DATA.forEach(s => { globalTotal += s.questions.length; });
  document.getElementById('globalTotal').textContent = globalTotal;

  DATA.forEach((section, si) => {
    // Nav item
    const sectionDone = section.questions.filter((_,qi)=>done.has(section.id+'-'+qi)).length;
    const navEl = document.createElement('div');
    navEl.className='nav-item'+(si===0?' active':'');
    navEl.dataset.section=section.id;
    navEl.innerHTML=`<div class="nav-icon">${section.icon}</div>${section.title}<span class="nav-progress">${sectionDone}/${section.questions.length}</span>`;
    navEl.onclick=()=>{
      document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
      navEl.classList.add('active');
      document.querySelectorAll('.section-wrap').forEach(s=>s.style.display='none');
      document.getElementById('sec-'+section.id).style.display='block';
      if(window.innerWidth<=768) toggleSidebar();
    };
    nav.appendChild(navEl);

    // Section content
    const secDiv = document.createElement('div');
    secDiv.className='section-wrap';
    secDiv.id='sec-'+section.id;
    secDiv.style.display=si===0?'block':'none';

    const doneInSection = section.questions.filter((_,qi)=>done.has(section.id+'-'+qi)).length;
    const pct = Math.round(doneInSection/section.questions.length*100);

    secDiv.innerHTML=`
      <div class="section-header">
        <div class="section-badge">${section.icon} ${section.questions.length} Questions</div>
        <div class="section-title"><em>${section.title}</em></div>
        <div class="section-desc">${section.desc}</div>
        <div class="progress-bar-wrap" style="margin-top:14px"><div class="progress-bar-fill" id="pb-${section.id}" style="width:${pct}%"></div></div>
      </div>
      <div class="stats-row">
        <div class="stat-card"><div class="stat-num">${section.questions.length}</div><div class="stat-label">Questions</div></div>
        <div class="stat-card"><div class="stat-num" id="done-${section.id}">${doneInSection}</div><div class="stat-label">Done</div></div>
        <div class="stat-card"><div class="stat-num" id="pct-${section.id}">${pct}%</div><div class="stat-label">Progress</div></div>
      </div>
    `;

    section.questions.forEach((q, qi) => {
      const key = section.id+'-'+qi;
      const isDone = done.has(key);
      const tagMap = {hot:'tag-hot HOT',core:'tag-core CORE',deep:'tag-deep DEEP',design:'tag-design DESIGN'};
      const [tagCls, tagLabel] = (tagMap[q.tag]||'tag-core CORE').split(' ');

      const card = document.createElement('div');
      card.className='q-card'+(isDone?' done':'');
      card.id='card-'+key;

      let bodyContent = `<div class="answer-box">${q.a}</div>`;
      if(q.code) bodyContent += `<div class="code-block">${escHtml(q.code)}</div>`;
      if(q.tip) bodyContent += `<div class="tip-box">${q.tip}</div>`;
      if(q.ctx) bodyContent += `<div class="ctx-box">${q.ctx}</div>`;
      if(q.warn) bodyContent += `<div class="warn-box">${q.warn}</div>`;
      if(q.links && q.links.length) {
        bodyContent += `<div class="links-row">${q.links.map(([t,u])=>`<a class="link-pill" href="${u}" target="_blank">↗ ${t}</a>`).join('')}</div>`;
      }

      card.innerHTML=`
        <div class="q-header" onclick="toggleQ(this,'${key}')">
          <span class="q-num">${(qi+1).toString().padStart(2,'0')}</span>
          <span class="q-text">${q.q}</span>
          <div class="q-right">
            <span class="q-tag ${tagCls}">${tagLabel}</span>
            <button class="check-btn" onclick="toggleDone(event,'${key}','${section.id}')">${isDone?'✓':'○'}</button>
            <span class="chevron">▼</span>
          </div>
        </div>
        <div class="q-body" id="body-${key}">${bodyContent}</div>
      `;
      secDiv.appendChild(card);
    });

    content.appendChild(secDiv);
  });

  updateGlobalCount();
}

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleQ(header, key) {
  const body = document.getElementById('body-'+key);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  header.classList.toggle('open', !isOpen);
}

function toggleDone(e, key, sectionId) {
  e.stopPropagation();
  const card = document.getElementById('card-'+key);
  const btn = card.querySelector('.check-btn');
  if(done.has(key)) {
    done.delete(key);
    card.classList.remove('done');
    btn.textContent='○';
  } else {
    done.add(key);
    card.classList.add('done');
    btn.textContent='✓';
  }
  save();
  updateSectionProgress(sectionId);
  updateGlobalCount();
}

function updateSectionProgress(sectionId) {
  const section = DATA.find(s=>s.id===sectionId);
  const doneCount = section.questions.filter((_,qi)=>done.has(sectionId+'-'+qi)).length;
  const total = section.questions.length;
  const pct = Math.round(doneCount/total*100);
  const dEl = document.getElementById('done-'+sectionId);
  const pEl = document.getElementById('pct-'+sectionId);
  const pb = document.getElementById('pb-'+sectionId);
  if(dEl) dEl.textContent=doneCount;
  if(pEl) pEl.textContent=pct+'%';
  if(pb) pb.style.width=pct+'%';
  // update nav
  document.querySelectorAll('.nav-item').forEach(n=>{
    if(n.dataset.section===sectionId) {
      n.querySelector('.nav-progress').textContent=`${doneCount}/${total}`;
    }
  });
}

function updateGlobalCount() {
  document.getElementById('globalCount').textContent=done.size;
}

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('overlay');
  sb.classList.toggle('open');
  ov.classList.toggle('open');
}

renderAll();
</script>
</body>
</html>
